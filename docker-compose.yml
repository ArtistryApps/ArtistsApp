version: "3.8"

services:
  api:
    build: ./backend
    image: artists_api:0.1.0
    command: ./app/docker-entrypoint.sh
    ports:
      - 8000:8000
    environment:
      USERNAME_API_CIVITAS: ${USERNAME_API_CIVITAS}
      USERID_API_CIVITAS: ${USERID_API_CIVITAS}
      PASSWORD_API_CIVITAS: ${PASSWORD_API_CIVITAS}
    secrets:
      - psql_password
    depends_on:
      - psql
  psql:
    image: postgres:12-bullseye
    ports:
      - 5433:5432
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - psql_password
  web:
    build: ./frontend
    image: artists_web:0.1.0
    command: ./docker-entrypoint.sh
    ports:
      - 80:80
    depends_on:
      - psql

secrets:
  psql_password:
    file: ./psql_password.txt
